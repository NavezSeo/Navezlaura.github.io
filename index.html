<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laura Ataide | Software Engineer</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Poppins:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

    <style>
      :root { 
          --neon-green: #00ff88; 
          --dark-bg: #000000; 
          --card-bg: #0a0a0a;
          /* Variables dinámicas manipuladas por el ritmo de la música */
          --beat-scale: 1;
          --beat-glow: 15px;
          --bg-intensity: 0.05;
          --lightning-opacity: 0.4;
      }
      
      body {
          background-color: var(--dark-bg);
          margin: 0;
          color: #ffffff;
          font-family: 'Poppins', sans-serif;
          overflow-x: hidden;
      }

      /* Fondo de estrellas reactivo */
      body::before {
          content: "";
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: radial-gradient(circle at center, rgba(0, 255, 136, calc(var(--bg-intensity) * 2)) 0%, transparent 75%),
                      url('https://www.transparenttextures.com/patterns/stardust.png');
          animation: backgroundMove 150s linear infinite;
          z-index: -2;
          opacity: 0.25;
      }

      @keyframes backgroundMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

      /* --- ESTILO 1: ANIMACIÓN LÁSER (Solo para la primera tarjeta) --- */
      .hero-laser-card {
          position: relative;
          overflow: hidden;
          background: var(--card-bg);
          border-radius: 12px;
          z-index: 1;
          padding: 3rem;
          border: 1px solid rgba(0, 255, 136, 0.1);
      }

      .hero-laser-card::before {
          content: "";
          position: absolute;
          top: -50%; left: -50%; width: 200%; height: 200%;
          background: conic-gradient(transparent, var(--neon-green), transparent 30%);
          animation: laserRotate 4s linear infinite;
          z-index: -2;
      }

      .hero-laser-card::after {
          content: "";
          position: absolute;
          inset: 3px;
          background: var(--card-bg);
          border-radius: 10px;
          z-index: -1;
      }

      @keyframes laserRotate { 100% { transform: rotate(1turn); } }

      /* --- ESTILO 2: ANIMACIÓN DE RESPIRACIÓN (Para Multimedia y Proyectos) --- */
      .respiracao-card {
          background: rgba(10, 10, 12, 0.95);
          border: 2px solid var(--neon-green);
          border-radius: 15px;
          animation: neonBreath 4s infinite ease-in-out;
          transition: transform 0.3s ease;
          display: flex;
          flex-direction: column;
      }

      @keyframes neonBreath {
          0%, 100% { box-shadow: 0 0 10px var(--neon-green), 0 0 15px rgba(0, 255, 136, 0.2); border-color: var(--neon-green); }
          50% { box-shadow: 0 0 20px var(--neon-green), 0 0 35px rgba(0, 255, 136, 0.4); border-color: #77ffc9; }
      }

      .respiracao-card:hover {
          transform: translateY(-5px);
          animation: none;
          box-shadow: 0 0 25px var(--neon-green);
      }

      .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

      /* --- HERO CONTENT --- */
      .conteudo-principal { display: flex; align-items: center; justify-content: space-between; padding: 6rem 0; gap: 50px; flex-wrap: wrap; }
      .conteudo-principal-titulo { font-family: 'Share Tech Mono', monospace; font-size: 3.2rem; margin: 0; text-transform: uppercase; }
      .conteudo-principal-titulo span { display: block; font-family: 'Poppins'; font-size: 1.1rem; color: var(--neon-green); margin-top: 10px; }
      .conteudo-principal-imagem img { width: 300px; height: 300px; border-radius: 50%; border: 2px solid var(--neon-green); object-fit: cover; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }

      /* --- REPRODUCTORES --- */
      .section-title { text-align: center; font-family: 'Chakra Petch'; color: var(--neon-green); margin: 4rem 0 2rem; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-green); }
      .multimedia-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
      .player-header { background: var(--neon-green); color: #000; padding: 6px 15px; font-family: 'Share Tech Mono'; font-weight: bold; display: flex; justify-content: space-between; font-size: 0.8rem; border-radius: 12px 12px 0 0; }
      .tv-frame { width: 100%; height: 350px; border: none; background: #000; }
      
      /* --- ENTORNO DETALLADO DE RADIO FUTURISTA --- */
      .radio-display { padding: 30px 20px; text-align: center; background: #030305; position: relative; overflow: hidden; min-height: 350px; display: flex; flex-direction: column; justify-content: space-between; }
      
      /* Tubo Neon Estructurado del Fondo (Marco de Luz) */
      .neon-backdrop-frame {
          position: absolute; top: 15px; left: 15px; right: 15px; bottom: 90px;
          border: 2px solid rgba(0, 255, 136, 0.4); border-radius: 10px;
          box-shadow: inset 0 0 15px rgba(0, 255, 136, calc(var(--bg-intensity) * 3)), 0 0 calc(var(--beat-glow) * 1.2) rgba(0, 255, 136, 0.6);
          z-index: 0; pointer-events: none;
      }
      
      /* Rejilla de perspectiva cibernética en el fondo */
      .cyber-grid-bg {
          position: absolute; inset: 0;
          background-image: linear-gradient(rgba(0,255,136, calc(var(--bg-intensity) * 0.4)) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(0,255,136, calc(var(--bg-intensity) * 0.4)) 1px, transparent 1px);
          background-size: 20px 20px;
          background-position: center;
          transform: perspective(200px) rotateX(60deg) scale(1.8);
          transform-origin: top;
          opacity: 0.7; z-index: 0; pointer-events: none;
      }

      .studio-setup { display: flex; justify-content: space-around; align-items: flex-end; position: relative; z-index: 1; width: 100%; margin-top: 10px; }
      
      /* Parlantes 3D Facetados */
      .speaker {
          width: 90px; height: 160px; 
          background: linear-gradient(135deg, #111116 0%, #08080a 50%, #1c1c24 100%);
          border: 1px solid rgba(255,255,255,0.05);
          clip-path: polygon(15% 0%, 85% 0%, 100% 8%, 100% 92%, 85% 100%, 15% 100%, 0% 92%, 0% 8%); /* Forma angular facetada */
          display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 15px rgba(255,255,255,0.05);
          transform: scale(var(--beat-scale)); /* Vibración física sincronizada */
          transition: transform 0.04s cubic-bezier(0.25, 1, 0.5, 1);
      }
      
      /* Anillos de energía y rayos eléctricos */
      .subwoofer-ring {
          width: 65px; height: 65px; border-radius: 50%;
          background: radial-gradient(circle, #000 40%, rgba(0,255,136,0.1) 70%, rgba(0,255,136,0.4) 100%);
          border: 2px solid var(--neon-green);
          box-shadow: 0 0 var(--beat-glow) rgba(0, 255, 136, 0.8), inset 0 0 12px var(--neon-green);
          position: relative; display: flex; justify-content: center; align-items: center;
      }
      
      /* Efecto de rayos/plasma interno simulado con pseudoelementos dinámicos */
      .subwoofer-ring::before {
          content: ""; position: absolute; inset: -4px; border-radius: 50%;
          border: 1px dashed #ff0088; opacity: var(--lightning-opacity);
          animation: rotateLightning 1s linear infinite;
      }
      @keyframes rotateLightning { 100% { transform: rotate(360deg); } }

      .tweeter-ring {
          width: 32px; height: 32px; border-radius: 50%;
          background: #050508; border: 1.5px solid rgba(0, 255, 136, 0.5);
          box-shadow: 0 0 calc(var(--beat-glow) * 0.4) rgba(0, 255, 136, 0.4);
      }

      /* Monitor Flotante Translúcido */
      .monitor-wrapper { display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 0 15px rgba(0,255,136,0.2)); }
      .monitor {
          width: 190px; height: 125px; 
          background: rgba(4, 8, 12, 0.75); 
          border: 2px solid rgba(0, 255, 136, 0.6); border-radius: 4px;
          position: relative; display: flex; align-items: flex-end; padding: 1px; overflow: hidden;
          backdrop-filter: blur(4px);
          box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2), 0 0 var(--beat-glow) rgba(0, 255, 136, 0.3);
      }
      .monitor::before {
          content: "SCAN"; position: absolute; top: 6px; left: 8px;
          font-family: 'Share Tech Mono'; font-size: 0.55rem; color: rgba(0,255,136,0.7); letter-spacing: 1px;
      }
      .monitor-stand { width: 25px; height: 25px; background: linear-gradient(#151922, #0a0a0f); border: 1px solid rgba(0,255,136,0.3); }
      .monitor-base { width: 75px; height: 5px; background: #151922; border-radius: 2px; border-bottom: 2px solid var(--neon-green); }

      #canvas-equal
